<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#f4ede0"/>
  <g transform="translate(256, 248)">
    <!-- Nest — woven bowl shape -->
    <ellipse cx="0" cy="28" rx="100" ry="38" fill="#8b6914" opacity="0.15"/>
    <path d="M-88,0 Q-92,40 -60,52 Q0,68 60,52 Q92,40 88,0" fill="none" stroke="#7a5a1a" stroke-width="8" stroke-linecap="round"/>
    <path d="M-82,4 Q-86,36 -54,46 Q0,58 54,46 Q86,36 82,4" fill="none" stroke="#9e7b2e" stroke-width="5" stroke-linecap="round"/>
    <path d="M-76,6 Q-78,32 -48,40 Q0,50 48,40 Q78,32 76,6" fill="none" stroke="#b8943e" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Nest interior fill -->
    <path d="M-76,6 Q-78,32 -48,40 Q0,50 48,40 Q78,32 76,6 Z" fill="#d4b87a" opacity="0.3"/>
    <!-- Twigs — crossing lines for texture -->
    <line x1="-70" y1="14" x2="-30" y2="8" stroke="#9e7b2e" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="35" y1="10" x2="72" y2="18" stroke="#9e7b2e" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-50" y1="24" x2="-20" y2="34" stroke="#b8943e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="30" x2="55" y2="22" stroke="#b8943e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Egg — warm white with subtle speckle -->
    <ellipse cx="0" cy="-4" rx="28" ry="36" fill="#faf5eb" transform="rotate(-6)"/>
    <ellipse cx="0" cy="-4" rx="28" ry="36" fill="none" stroke="#e8dece" stroke-width="1.5" transform="rotate(-6)"/>
    <!-- Speckles -->
    <circle cx="-8" cy="-14" r="1.8" fill="#c4a97a" opacity="0.5"/>
    <circle cx="6" cy="-8" r="1.2" fill="#c4a97a" opacity="0.4"/>
    <circle cx="-3" cy="4" r="1.5" fill="#c4a97a" opacity="0.35"/>
    <circle cx="10" cy="-18" r="1" fill="#c4a97a" opacity="0.45"/>
    <circle cx="-12" cy="0" r="1.3" fill="#c4a97a" opacity="0.3"/>
    <!-- Warm highlight on egg -->
    <ellipse cx="-6" cy="-16" rx="10" ry="14" fill="white" opacity="0.2" transform="rotate(-10)"/>
  </g>
  <!-- App name -->
  <text x="256" y="390" text-anchor="middle" font-family="Georgia, serif" font-style="italic"
        font-size="58" font-weight="500" fill="#2b2218">Roost</text>
</svg>
