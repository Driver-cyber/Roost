<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#f4ede0"/>
  <!-- Rust circle -->
  <circle cx="256" cy="256" r="160" fill="#b85c2e"/>
  <!-- Subtle inner shadow ring for depth -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#7a2e10" stroke-width="2" opacity="0.3"/>
  <!-- Italic R -->
  <text x="256" y="316" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-style="italic"
        font-weight="600" font-size="200" fill="#f4ede0">R</text>
  <!-- Gold egg dot -->
  <circle cx="316" cy="316" r="18" fill="#d4a942"/>
  <!-- Tiny highlight on egg -->
  <ellipse cx="312" cy="310" rx="5" ry="7" fill="#fef6e3" opacity="0.6" transform="rotate(-15 312 310)"/>
</svg>
