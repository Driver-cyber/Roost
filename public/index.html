<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4ede0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Roost">
  <meta name="description" content="Your neighborhood, in birds.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Roost</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
</head>
<body>
  <div class="app">
    <!-- Voice line -->
    <div class="voice-line" id="voice-line-wrap">
      <p id="voice-text"></p>
    </div>

    <!-- Views -->
    <div class="view-container">

      <!-- ============ MAP VIEW ============ -->
      <div id="view-map" class="view active">
        <div class="map-wrap">
          <div id="map"></div>
          <div class="map-loading" id="map-loading">
            <span>drawing the neighborhood...</span>
          </div>
        </div>

        <div class="bottom-sheet">
          <div class="bottom-sheet-header">
            <h2>Today on your block</h2>
            <span class="count" id="today-count"></span>
          </div>
          <div id="today-feed"></div>
        </div>
      </div>

      <!-- ============ JOURNAL VIEW ============ -->
      <div id="view-journal" class="view">
        <div class="journal-header">
          <h1>Field Journal</h1>
          <span class="species-count" id="journal-species-count"></span>
        </div>
        <div id="journal-entries"></div>
      </div>

      <!-- ============ DECK VIEW ============ -->
      <div id="view-deck" class="view">
        <div class="deck-header">
          <h1>Birds</h1>
          <span class="deck-stats" id="deck-stats"></span>
        </div>
        <div id="deck-grid" class="deck-grid"></div>
      </div>
    </div>

    <!-- FAB — Add Sighting -->
    <button class="fab" id="fab-add" aria-label="Add sighting">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Tab bar -->
    <nav class="tab-bar">
      <button class="tab active" data-view="view-map" aria-label="Map">
        <svg viewBox="0 0 24 24">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        <span>Map</span>
      </button>
      <button class="tab" data-view="view-journal" aria-label="Journal">
        <svg viewBox="0 0 24 24">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="8" y1="7" x2="16" y2="7"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <span>Journal</span>
      </button>
      <button class="tab" data-view="view-deck" aria-label="Birds">
        <svg viewBox="0 0 24 24">
          <path d="M18 8c0-3.3-2.7-6-6-6S6 4.7 6 8c0 2.5 1.5 4.6 3.6 5.5"/>
          <path d="M12 2c1 2 4 4 4 8"/>
          <ellipse cx="12" cy="16" rx="5" ry="4"/>
          <circle cx="10.5" cy="15.5" r="0.8" fill="currentColor" stroke="none"/>
          <path d="M14 16.5l2 1"/>
          <path d="M9 20l-1 2M15 20l1 2"/>
        </svg>
        <span>Birds</span>
      </button>
    </nav>
  </div>

  <!-- ============ ADD SIGHTING MODAL ============ -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Log a sighting</h2>
      <form id="form-sighting" autocomplete="off">
        <div class="form-group">
          <label for="input-species">What did you see?</label>
          <input type="text" id="input-species" placeholder="e.g., Northern Cardinal" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-date">When</label>
            <input type="date" id="input-date">
          </div>
          <div class="form-group">
            <label for="input-time">Time</label>
            <input type="time" id="input-time">
          </div>
        </div>
        <div class="form-group">
          <label for="input-count">How many?</label>
          <input type="number" id="input-count" placeholder="1" min="1">
        </div>
        <div class="form-group">
          <label for="input-notes">Notes</label>
          <textarea id="input-notes" placeholder="Singing from the top of the maple..."></textarea>
        </div>
        <button type="submit" class="btn-primary">Add to journal</button>
        <button type="button" class="btn-secondary" id="btn-import-csv">Import from eBird CSV instead</button>
      </form>

      <!-- CSV Import (hidden by default) -->
      <div id="csv-import-section" style="display:none;">
        <div class="csv-drop" id="csv-drop">
          <div class="drop-icon">🗂</div>
          <div class="drop-text">Drop your eBird CSV here</div>
          <div class="drop-hint">or tap to choose a file</div>
          <input type="file" id="csv-file" accept=".csv" style="display:none">
        </div>
        <div class="import-progress" id="import-progress">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="import-status" id="import-status">Preparing...</div>
        </div>
        <button type="button" class="btn-secondary" id="btn-back-manual" style="margin-top:16px">Back to manual entry</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
