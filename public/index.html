<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4ede0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Roost">
  <meta name="description" content="Your neighborhood, in birds.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Roost</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: #f4ede0;
      --paper-warm: #fef6e3;
      --ink: #2b2218;
      --ink-soft: #6b5d4a;
      --moss: #4a6b3a;
      --moss-deep: #2f4624;
      --rust: #b85c2e;
      --rust-deep: #7a2e10;
      --gold: #d4a942;
      --sky: #7da7c4;

      --font-voice: 'Fraunces', Georgia, serif;
      --font-ui: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;

      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    /* --- Voice line (top of map) --- */
    .voice-line {
      padding: 16px 20px 12px;
      text-align: center;
    }

    .voice-line p {
      font-family: var(--font-voice);
      font-style: italic;
      font-weight: 400;
      font-size: 1.05rem;
      color: var(--ink);
      line-height: 1.6;
    }

    /* --- Main content area --- */
    .view-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .view {
      display: none;
      min-height: 100%;
    }

    .view.active {
      display: block;
    }

    /* --- Map view --- */
    #view-map .map-placeholder {
      margin: 0 16px;
      height: 55vh;
      min-height: 280px;
      border-radius: 12px;
      background: #e8e0d0;
      border: 1.5px solid #d4cbb8;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #view-map .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, var(--moss) 1px, transparent 1px),
        radial-gradient(circle at 70% 60%, var(--rust) 1.5px, transparent 1.5px),
        radial-gradient(circle at 50% 30%, var(--gold) 2px, transparent 2px),
        radial-gradient(circle at 20% 70%, var(--moss) 0.8px, transparent 0.8px),
        radial-gradient(circle at 80% 25%, var(--rust) 1px, transparent 1px);
      opacity: 0.4;
    }

    #view-map .map-placeholder span {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-soft);
      background: var(--paper);
      padding: 6px 14px;
      border-radius: 6px;
      z-index: 1;
    }

    /* --- Bottom sheet (today feed) --- */
    .bottom-sheet {
      margin: 16px 16px 0;
      padding: 16px 20px 20px;
      background: var(--paper-warm);
      border-radius: 16px 16px 0 0;
      border: 1px solid #e8dfd0;
      border-bottom: none;
    }

    .bottom-sheet h2 {
      font-family: var(--font-voice);
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #e8dfd0;
    }

    .feed-item:last-child { border-bottom: none; }

    .feed-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 7px;
      flex-shrink: 0;
    }

    .feed-dot.rust { background: var(--rust); }
    .feed-dot.gold { background: var(--gold); }
    .feed-dot.moss { background: var(--moss); }

    .feed-text {
      flex: 1;
    }

    .feed-text .bird-name {
      font-family: var(--font-voice);
      font-style: italic;
      font-weight: 500;
      color: var(--ink);
    }

    .feed-text .meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-soft);
    }

    .empty-state p {
      font-family: var(--font-voice);
      font-style: italic;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .empty-state .hint {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-style: normal;
    }

    /* --- Journal view --- */
    #view-journal { padding: 20px 16px; }

    .journal-header {
      font-family: var(--font-voice);
      font-weight: 500;
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: var(--ink);
    }

    .journal-entry {
      padding: 16px 0;
      border-bottom: 1px solid #e0d8ca;
    }

    .journal-entry .date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }

    .journal-entry .body {
      font-family: var(--font-voice);
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--ink);
    }

    .journal-entry .place {
      font-family: var(--font-voice);
      font-style: italic;
      font-size: 0.8rem;
      color: var(--rust);
      margin-top: 4px;
    }

    /* --- Deck view (birds) --- */
    #view-deck { padding: 20px 16px; }

    .deck-header {
      font-family: var(--font-voice);
      font-weight: 500;
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: var(--ink);
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .deck-card {
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 6px;
      text-align: center;
      transition: transform 0.15s ease;
    }

    .deck-card:active { transform: scale(0.97); }

    .deck-card.seen {
      background: var(--paper-warm);
      border: 1.5px solid #e0d8ca;
    }

    .deck-card.unseen {
      background: #eae3d4;
      border: 1.5px dashed #d4cbb8;
      opacity: 0.6;
    }

    .deck-card .bird-icon {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .deck-card.unseen .bird-icon {
      filter: grayscale(1);
      opacity: 0.4;
    }

    .deck-card .card-name {
      font-family: var(--font-voice);
      font-style: italic;
      font-size: 0.7rem;
      color: var(--ink);
      line-height: 1.3;
    }

    .deck-card.unseen .card-name {
      color: var(--ink-soft);
    }

    .deck-card .card-count {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--ink-soft);
      margin-top: 3px;
    }

    /* --- Tab bar --- */
    .tab-bar {
      display: flex;
      border-top: 1px solid #ddd5c5;
      background: var(--paper);
      padding-bottom: var(--safe-bottom);
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 0 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-soft);
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab.active { color: var(--rust); }

    .tab svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab.active svg { stroke-width: 2.2; }

    .tab span {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Voice line -->
    <div class="voice-line">
      <p id="voice-text"><em>Listening for the neighborhood...</em></p>
    </div>

    <!-- Views -->
    <div class="view-container">
      <!-- Map -->
      <div id="view-map" class="view active">
        <div class="map-placeholder">
          <span>map loads here</span>
        </div>
        <div class="bottom-sheet">
          <h2>Today on your block</h2>
          <div id="today-feed">
            <div class="empty-state">
              <p>No sightings yet today.</p>
              <span class="hint">They'll show up here as they arrive.</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Journal -->
      <div id="view-journal" class="view">
        <h1 class="journal-header">Field Journal</h1>
        <div id="journal-entries">
          <div class="empty-state">
            <p>Your journal is waiting.</p>
            <span class="hint">Sightings will appear here as a story.</span>
          </div>
        </div>
      </div>

      <!-- Deck -->
      <div id="view-deck" class="view">
        <h1 class="deck-header">Birds</h1>
        <div id="deck-grid" class="deck-grid">
          <div class="empty-state" style="grid-column: 1 / -1;">
            <p>Your collection starts here.</p>
            <span class="hint">Each new species unlocks a card.</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab bar -->
    <nav class="tab-bar">
      <button class="tab active" data-view="view-map" aria-label="Map">
        <svg viewBox="0 0 24 24">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        <span>Map</span>
      </button>
      <button class="tab" data-view="view-journal" aria-label="Journal">
        <svg viewBox="0 0 24 24">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="8" y1="7" x2="16" y2="7"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <span>Journal</span>
      </button>
      <button class="tab" data-view="view-deck" aria-label="Birds">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2C6.5 2 2 12 2 12s4.5 10 10 10 10-10 10-10S17.5 2 12 2z"/>
          <path d="M2 12c3-2 5.5-1 7 1"/>
          <path d="M15 11c1.5-2 4-3 7-1"/>
        </svg>
        <span>Birds</span>
      </button>
    </nav>
  </div>

  <script>
    // Tab navigation
    const tabs = document.querySelectorAll('.tab');
    const views = document.querySelectorAll('.view');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.view;
        tabs.forEach(t => t.classList.remove('active'));
        views.forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(target).classList.add('active');
      });
    });

    // Service worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
